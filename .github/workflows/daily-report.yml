name: 每日推送 BuilderPulse 日报到飞书

on:
  schedule:
    # 每天北京时间 12:30 (UTC 4:30) 运行
    - cron: '30 4 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  send-daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout BuilderPulse 仓库
        uses: actions/checkout@v4
        with:
          repository: BuilderPulse/BuilderPulse
          ref: main
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: 安装依赖
        run: |
          pip install requests

      - name: 获取并发送日报
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/09a06538-7405-4af4-b6af-3879c472cc34
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os
          from datetime import datetime
          from pathlib import Path

          FEISHU_WEBHOOK = os.environ.get('FEISHU_WEBHOOK')

          if not FEISHU_WEBHOOK:
              print("❌ 错误: FEISHU_WEBHOOK 环境变量未设置")
              exit(1)

          def find_latest_report():
              """查找最新的中文日报"""
              today = datetime.now().strftime("%Y-%m-%d")
              year = datetime.now().strftime("%Y")

              # 按照 BuilderPulse 的目录结构查找
              # 格式: zh/YYYY/YYYY-MM-DD.md
              possible_paths = [
                  f"zh/{year}/{today}.md",
                  f"zh/{today}.md",
                  f"reports/{today}_zh.md",
                  f"daily/{today}_zh.md",
                  f"{today}_zh.md",
              ]

              for path in possible_paths:
                  file_path = Path(path)
                  if file_path.exists():
                      print(f"✅ 找到日报: {path}")
                      return file_path.read_text(encoding='utf-8')

              # 如果找不到今天的，查找 zh/ 目录下最新的
              zh_dir = Path(f"zh/{year}")
              if zh_dir.exists():
                  md_files = sorted(zh_dir.glob('*.md'), reverse=True)
                  if md_files:
                      print(f"✅ 找到最新日报: {md_files[0]}")
                      return md_files[0].read_text(encoding='utf-8')

              return None

          def parse_markdown_to_feishu(content):
              """将 Markdown 转换为飞书卡片元素"""
              lines = content.split('\n')
              elements = []

              for line in lines[:50]:  # 限制行数
                  line = line.strip()
                  if not line:
                      continue

                  # 处理标题
                  if line.startswith('# '):
                      elements.append({
                          "tag": "div",
                          "text": {
                              "tag": "plain_text",
                              "content": f"📌 {line[2:]}"
                          }
                      })
                  elif line.startswith('## '):
                      elements.append({
                          "tag": "div",
                          "text": {
                              "tag": "plain_text",
                              "content": f"\n▶ {line[3:]}"
                          }
                      })
                  elif line.startswith('### '):
                      elements.append({
                          "tag": "div",
                          "text": {
                              "tag": "plain_text",
                              "content": f"  • {line[4:]}"
                          }
                      })
                  # 处理引用
                  elif line.startswith('>'):
                      text = line.lstrip('> ').strip()
                      if text:
                          elements.append({
                              "tag": "note",
                              "elements": [{
                                  "tag": "plain_text",
                                  "content": text
                              }]
                          })
                  # 处理列表
                  elif line.startswith('- ') or line.startswith('* '):
                      elements.append({
                          "tag": "div",
                          "text": {
                              "tag": "plain_text",
                              "content": f"  • {line[2:]}"
                          }
                      })
                  # 处理数字列表
                  elif line[0].isdigit() and '. ' in line:
                      elements.append({
                          "tag": "div",
                          "text": {
                              "tag": "plain_text",
                              "content": f"  {line}"
                          }
                      })
                  # 处理分隔线
                  elif line.startswith('---'):
                      elements.append({"tag": "hr"})
                  # 普通文本
                  else:
                      # 移除 Markdown 格式符号
                      text = line.replace('**', '').replace('*', '').replace('`', '')
                      if len(text) > 5:  # 过滤太短的行
                          elements.append({
                              "tag": "div",
                              "text": {
                                  "tag": "plain_text",
                                  "content": text
                              }
                          })

              return elements

          def send_to_feishu(content, title="📊 BuilderPulse 日报"):
              """发送到飞书"""
              if not content:
                  content = "⚠️ 今天的日报还未生成"

              # 添加日期和链接
              today = datetime.now().strftime("%Y-%m-%d")
              year = datetime.now().strftime("%Y")
              github_link = f"https://github.com/BuilderPulse/BuilderPulse/blob/main/zh/{year}/{today}.md"

              # 解析 Markdown 内容
              content_elements = parse_markdown_to_feishu(content)

              # 添加查看完整报告的提示和按钮
              content_elements.append({"tag": "hr"})
              content_elements.append({
                  "tag": "note",
                  "elements": [{
                      "tag": "plain_text",
                      "content": "以上为摘要，点击下方按钮查看完整内容"
                  }]
              })
              content_elements.append({
                  "tag": "action",
                  "actions": [{
                      "tag": "button",
                      "text": {
                          "tag": "plain_text",
                          "content": "📖 查看完整报告"
                      },
                      "type": "primary",
                      "url": github_link
                  }]
              })

              # 使用飞书交互式卡片格式
              payload = {
                  "msg_type": "interactive",
                  "card": {
                      "header": {
                          "title": {
                              "tag": "plain_text",
                              "content": f"📊 BuilderPulse 日报 - {today}"
                          },
                          "template": "blue"
                      },
                      "elements": content_elements
                  }
              }

              try:
                  response = requests.post(
                      FEISHU_WEBHOOK,
                      headers={"Content-Type": "application/json"},
                      data=json.dumps(payload),
                      timeout=30
                  )
                  response.raise_for_status()
                  result = response.json()

                  if result.get('code') == 0:
                      print("✅ 发送到飞书成功")
                      return True
                  else:
                      print(f"❌ 飞书返回错误: {result}")
                      return False

              except Exception as e:
                  print(f"❌ 发送失败: {e}")
                  return False

          def main():
              print(f"🚀 开始执行 - {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")

              # 查找日报
              report = find_latest_report()

              if report:
                  print(f"📄 日报长度: {len(report)} 字符")
                  send_to_feishu(report)
              else:
                  print("❌ 未找到日报文件")
                  send_to_feishu(None)

          if __name__ == "__main__":
              main()
          EOF
